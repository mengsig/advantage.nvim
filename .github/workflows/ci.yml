name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim: ["v0.10.4", "stable", "nightly"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim ${{ matrix.nvim }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Run smoke tests
        run: nvim -l tests/smoke.lua

      - name: Enforce local performance budgets
        run: nvim -l tests/perf.lua

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .
